# Local + EC2 deployment — identical stack, differing only in env values and
# the "edge" profile (Caddy: EC2 only, needs a public domain for TLS).
# Host ports match shared.config defaults: Kafka 19092, pandaproxy 8082.
services:

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092      # in-network listener
    volumes:
      - ./data:/app/data                  # DuckDB lives here; shared with dashboard
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      # healthy = a cycle completed within the last 3 intervals
      test: ["CMD-SHELL", "test $(( $(date +%s) - $(stat -c %Y /tmp/scheduler-heartbeat 2>/dev/null || echo 0) )) -lt 900"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file: .env
    volumes:
      - ./data:/app/data                  # read-only connections only (standing rule 1)
    ports:
      - "8501:8501"
    restart: unless-stopped

  caddy:
    image: caddy:2
    profiles: ["edge"]                    # EC2 only: docker compose --profile edge up -d
    env_file: .env
    ports:
      - "80:80"                           # ACME HTTP challenge
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --mode=dev-container       # overprovisioned, no production checks — fits small hosts
      - --smp=1
      - --memory=1G
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:8082
    ports:
      - "19092:19092"   # Kafka, external listener
      - "8082:18082"    # pandaproxy HTTP (host 8082 -> external listener)
      - "9644:9644"     # admin API (rpk, healthcheck)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls=localhost:9644 | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  redpanda_data:
  caddy_data:
  caddy_config:
