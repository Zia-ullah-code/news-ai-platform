[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["dist", ".venv", "dbt_project/target"]

[tool.ruff.lint]
# defaults (pyflakes + pycodestyle errors) — correctness over style policing
select = ["E4", "E7", "E9", "F"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]  # bare `pytest` (CI) must resolve shared/ and services/ like `python -m pytest` does
