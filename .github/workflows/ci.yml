name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff==0.9.2

      - name: Lint
        run: ruff check .

      - name: Unit & contract tests
        run: pytest tests/ -q

      - name: dbt project parses
        run: dbt parse --project-dir dbt_project --profiles-dir dbt_project
